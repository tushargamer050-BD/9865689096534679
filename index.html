<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bangla Voice Pad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f8fafc; }
        .recording-pulse { animation: pulse 1.5s infinite; background-color: #ef4444 !important; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .textarea-box:focus { outline: none; border-color: #3b82f6; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <!-- Header -->
    <header class="bg-blue-600 text-white p-4 shadow-lg flex justify-between items-center">
        <h1 class="text-xl font-bold flex items-center gap-2">
            <i data-lucide="mic"></i> বাংলা ভয়েস টাইপিং
        </h1>
        <button onclick="location.reload()" class="p-2 bg-blue-500 rounded-full">
            <i data-lucide="refresh-cw" class="w-5 h-5"></i>
        </button>
    </header>

    <!-- Main Content -->
    <main class="flex-1 p-4 flex flex-col gap-4 overflow-hidden">
        
        <!-- Text Editor Area -->
        <div class="flex-1 bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col overflow-hidden">
            <textarea id="textOutput" class="textarea-box w-full flex-1 p-5 text-xl leading-relaxed resize-none" placeholder="এখানে বাংলা কথা বলুন, স্বয়ংক্রিয়ভাবে টাইপ হবে..."></textarea>
            
            <!-- Quick Action Bar -->
            <div class="p-3 bg-slate-50 border-t flex justify-between items-center">
                <div class="flex gap-2">
                    <button onclick="copyText()" class="flex items-center gap-1 px-4 py-2 bg-green-500 text-white rounded-lg text-sm font-bold active:scale-95 transition">
                        <i data-lucide="copy" class="w-4 h-4"></i> কপি
                    </button>
                    <button onclick="clearText()" class="flex items-center gap-1 px-4 py-2 bg-slate-200 text-slate-700 rounded-lg text-sm font-bold active:scale-95 transition">
                        <i data-lucide="eraser" class="w-4 h-4"></i> মুছুন
                    </button>
                </div>
                <div id="status" class="text-xs font-bold text-blue-600 animate-pulse hidden">কথা শুনছি...</div>
            </div>
        </div>

        <!-- Translation Buttons -->
        <div class="grid grid-cols-2 gap-3">
            <button onclick="translateText('bn', 'en')" class="py-3 bg-white border-2 border-blue-100 rounded-xl font-bold text-blue-600 hover:bg-blue-50 flex items-center justify-center gap-2">
                <i data-lucide="languages"></i> বাংলা থেকে ইংলিশ
            </button>
            <button onclick="translateText('en', 'bn')" class="py-3 bg-white border-2 border-green-100 rounded-xl font-bold text-green-600 hover:bg-green-50 flex items-center justify-center gap-2">
                <i data-lucide="languages"></i> ইংলিশ থেকে বাংলা
            </button>
        </div>

    </main>

    <!-- Bottom Controller -->
    <footer class="bg-white p-6 shadow-[0_-5px_20px_rgba(0,0,0,0.05)] rounded-t-[40px]">
        <div class="max-w-md mx-auto flex justify-around items-center">
            
            <!-- Speaker Button -->
            <button id="speakerBtn" onclick="readAloud()" class="w-14 h-14 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center shadow-md active:scale-90 transition-all" title="লেখাটি শুনুন">
                <i data-lucide="volume-2" class="w-7 h-7"></i>
            </button>

            <!-- Main Mic Button -->
            <button id="micBtn" onclick="toggleMic()" class="w-24 h-24 bg-blue-600 text-white rounded-full flex flex-col items-center justify-center shadow-xl active:scale-95 transition-all relative">
                <i data-lucide="mic" id="micIcon" class="w-10 h-10 mb-1"></i>
                <span class="text-[10px] font-bold uppercase tracking-wider">Start</span>
            </button>

            <!-- Share Button -->
            <button onclick="shareText()" class="w-14 h-14 bg-green-100 text-green-600 rounded-full flex items-center justify-center shadow-md active:scale-90 transition-all">
                <i data-lucide="share-2" class="w-7 h-7"></i>
            </button>

        </div>
    </footer>

    <script>
        lucide.createIcons();

        const textOutput = document.getElementById('textOutput');
        const micBtn = document.getElementById('micBtn');
        const micIcon = document.getElementById('micIcon');
        const statusText = document.getElementById('status');
        const speakerBtn = document.getElementById('speakerBtn');

        let isRecording = false;
        let recognition;

        // 1. Voice Typing (মাইক সিস্টেম)
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'bn-BD'; // বাংলা ভাষা সেট করা হয়েছে

            recognition.onstart = () => {
                isRecording = true;
                micBtn.classList.add('recording-pulse');
                statusText.classList.remove('hidden');
                micBtn.querySelector('span').innerText = "Stop";
            };

            recognition.onresult = (event) => {
                let finalTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript + ' ';
                    }
                }
                if (finalTranscript) {
                    textOutput.value += finalTranscript;
                    textOutput.scrollTop = textOutput.scrollHeight;
                }
            };

            recognition.onerror = (event) => {
                console.error("Error:", event.error);
                stopMic();
            };

            recognition.onend = () => {
                if (isRecording) recognition.start(); // ডিসকানেক্ট হলে আবার চালু হবে
            };
        }

        function toggleMic() {
            if (isRecording) {
                stopMic();
            } else {
                recognition.start();
            }
        }

        function stopMic() {
            isRecording = false;
            recognition.stop();
            micBtn.classList.remove('recording-pulse');
            statusText.classList.add('hidden');
            micBtn.querySelector('span').innerText = "Start";
        }

        // 2. Read Aloud (স্পিকার সিস্টেম)
        function readAloud() {
            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
                return;
            }

            const text = textOutput.value;
            if (!text) return;

            const speech = new SpeechSynthesisUtterance(text);
            speech.lang = 'bn-BD'; // বাংলা স্বরে কথা বলবে
            
            // উন্নত বাংলা কন্ঠস্বর খোঁজা
            const voices = window.speechSynthesis.getVoices();
            const bnVoice = voices.find(v => v.lang.includes('bn') || v.name.includes('Bangla'));
            if (bnVoice) speech.voice = bnVoice;

            speech.onstart = () => speakerBtn.classList.add('bg-red-100', 'text-red-600');
            speech.onend = () => speakerBtn.classList.remove('bg-red-100', 'text-red-600');

            window.speechSynthesis.speak(speech);
        }

        // 3. Translation (অনুবাদ)
        async function translateText(from, to) {
            const text = textOutput.value;
            if (!text) return;

            textOutput.value = "অনুবাদ হচ্ছে, দয়া করে অপেক্ষা করুন...";
            
            try {
                const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${from}|${to}`);
                const data = await res.json();
                textOutput.value = data.responseData.translatedText;
            } catch (err) {
                alert("ইন্টারনেট সংযোগ চেক করুন।");
            }
        }

        // 4. Utility Functions
        function copyText() {
            textOutput.select();
            document.execCommand('copy');
            alert("কপি হয়েছে!");
        }

        function clearText() {
            if(confirm("সব লেখা মুছে ফেলবেন?")) {
                textOutput.value = "";
            }
        }

        function shareText() {
            if (navigator.share) {
                navigator.share({
                    title: 'Bangla Voice Text',
                    text: textOutput.value
                });
            } else {
                window.open(`https://wa.me/?text=${encodeURIComponent(textOutput.value)}`);
            }
        }

        // ব্রাউজারে ভয়েস লোড হতে সময় নেয়
        window.speechSynthesis.onvoiceschanged = () => {};
    </script>
</body>
</html>
