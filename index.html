<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bangla Voice Pad - Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f1f5f9; }
        .recording-pulse { animation: pulse 1.5s infinite; background-color: #ef4444 !important; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .editor:focus { outline: none; border-color: #3b82f6; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <!-- Header -->
    <header class="bg-blue-600 text-white p-4 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-bold flex items-center gap-2">
            <i data-lucide="mic"></i> বাংলা ভয়েস টাইপিং
        </h1>
        <div id="micStatusIndicator" class="w-3 h-3 rounded-full bg-red-200"></div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 p-4 flex flex-col gap-4 overflow-hidden">
        
        <!-- Text Editor -->
        <div class="flex-1 bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col overflow-hidden">
            <textarea id="textOutput" class="editor w-full flex-1 p-5 text-xl leading-relaxed resize-none" placeholder="এখানে ক্লিক করে নিচের মাইক বাটন চাপুন এবং বাংলা কথা বলুন..."></textarea>
            
            <div class="p-3 bg-slate-50 border-t flex justify-between items-center">
                <button onclick="copyText()" class="px-4 py-2 bg-green-500 text-white rounded-lg text-sm font-bold flex items-center gap-1">
                    <i data-lucide="copy" class="w-4 h-4"></i> কপি
                </button>
                <div id="listeningText" class="text-blue-600 font-bold text-sm hidden animate-bounce italic">কথা শুনছি...</div>
                <button onclick="clearText()" class="px-4 py-2 bg-slate-200 text-slate-700 rounded-lg text-sm font-bold">মুছুন</button>
            </div>
        </div>

        <!-- Translation -->
        <div class="grid grid-cols-2 gap-2">
            <button onclick="translateText('bn', 'en')" class="py-3 bg-white border border-blue-200 rounded-xl font-bold text-blue-600 text-sm">BN → EN অনুবাদ</button>
            <button onclick="translateText('en', 'bn')" class="py-3 bg-white border border-green-200 rounded-xl font-bold text-green-600 text-sm">EN → BN অনুবাদ</button>
        </div>
    </main>

    <!-- Controls -->
    <footer class="bg-white p-6 shadow-2xl rounded-t-[30px] flex justify-around items-center">
        <!-- Speaker -->
        <button id="speakerBtn" onclick="readAloud()" class="w-14 h-14 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center shadow">
            <i data-lucide="volume-2" class="w-7 h-7"></i>
        </button>

        <!-- Fixed Mic Button -->
        <button id="micBtn" onclick="toggleMic()" class="w-20 h-20 bg-blue-600 text-white rounded-full flex flex-col items-center justify-center shadow-xl active:scale-90 transition-all">
            <i data-lucide="mic" id="micIcon" class="w-8 h-8"></i>
            <span id="micLabel" class="text-[10px] font-bold mt-1">START</span>
        </button>

        <!-- Share -->
        <button onclick="shareText()" class="w-14 h-14 bg-green-100 text-green-600 rounded-full flex items-center justify-center shadow">
            <i data-lucide="share-2" class="w-7 h-7"></i>
        </button>
    </footer>

    <script>
        lucide.createIcons();

        const textOutput = document.getElementById('textOutput');
        const micBtn = document.getElementById('micBtn');
        const micLabel = document.getElementById('micLabel');
        const listeningText = document.getElementById('listeningText');
        const indicator = document.getElementById('micStatusIndicator');

        let isRecording = false;
        let recognition;

        // চেক করা হচ্ছে ব্রাউজার ভয়েস সাপোর্ট করে কিনা
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (!SpeechRecognition) {
            alert("দুঃখিত, আপনার ব্রাউজারে মাইক সিস্টেম সাপোর্ট করছে না। দয়া করে Google Chrome ব্যবহার করুন।");
        } else {
            recognition = new SpeechRecognition();
            recognition.lang = 'bn-BD';
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onstart = () => {
                isRecording = true;
                micBtn.classList.add('recording-pulse');
                micLabel.innerText = "STOP";
                listeningText.classList.remove('hidden');
                indicator.classList.replace('bg-red-200', 'bg-green-500');
            };

            recognition.onresult = (event) => {
                let finalTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript + ' ';
                    }
                }
                if (finalTranscript) {
                    // যদি ডিফল্ট টেক্সট থাকে তবে তা মুছে ফেলা
                    if(textOutput.value.includes("এখানে ক্লিক করে")) textOutput.value = "";
                    textOutput.value += finalTranscript;
                    textOutput.scrollTop = textOutput.scrollHeight;
                }
            };

            recognition.onerror = (event) => {
                console.log("Error type: " + event.error);
                if(event.error === 'not-allowed') {
                    alert("মাইক ব্যবহারের অনুমতি দেওয়া হয়নি। ব্রাউজার সেটিংস থেকে Microphone Allow করুন।");
                }
                stopMic();
            };

            recognition.onend = () => {
                // যদি ইউজার নিজে বন্ধ না করে, তবে অটো রিস্টার্ট হবে (Continuous)
                if (isRecording) {
                    recognition.start();
                }
            };
        }

        function toggleMic() {
            if (!recognition) return;
            
            if (isRecording) {
                stopMic();
            } else {
                try {
                    recognition.start();
                } catch (e) {
                    console.error(e);
                }
            }
        }

        function stopMic() {
            isRecording = false;
            recognition.stop();
            micBtn.classList.remove('recording-pulse');
            micLabel.innerText = "START";
            listeningText.classList.add('hidden');
            indicator.classList.replace('bg-green-500', 'bg-red-200');
        }

        // স্পিকার সিস্টেম (যা আপনার ভালো লেগেছে)
        function readAloud() {
            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
                return;
            }
            const speech = new SpeechSynthesisUtterance(textOutput.value);
            speech.lang = 'bn-BD';
            window.speechSynthesis.speak(speech);
        }

        // অনুবাদ ও অন্যান্য
        async function translateText(from, to) {
            const text = textOutput.value;
            if (!text) return;
            textOutput.value = "অনুবাদ হচ্ছে...";
            try {
                const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${from}|${to}`);
                const data = await res.json();
                textOutput.value = data.responseData.translatedText;
            } catch (err) {
                alert("ইন্টারনেট সংযোগ সমস্যা!");
            }
        }

        function copyText() {
            textOutput.select();
            document.execCommand('copy');
            alert("কপি হয়েছে!");
        }

        function clearText() {
            textOutput.value = "";
        }

        function shareText() {
            if (navigator.share) {
                navigator.share({ text: textOutput.value });
            } else {
                alert("Share not supported in this browser.");
            }
        }
    </script>
</body>
</html>
