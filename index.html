<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bangla Voice Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f0f4f8; }

        /* মাইক অন থাকলে লাল পালস এনিমেশন */
        .mic-active {
            background-color: #ef4444 !important;
            box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
            animation: pulse-red 1.5s infinite;
        }
        @keyframes pulse-red {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        /* স্পিকার অন থাকলে নীল পালস এনিমেশন */
        .speaker-active {
            background-color: #3b82f6 !important;
            box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7);
            animation: pulse-blue 1.5s infinite;
        }
        @keyframes pulse-blue {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(59, 130, 246, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }

        .editor:focus { outline: none; border-color: #3b82f6; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <!-- Header -->
    <header class="bg-white p-4 shadow-sm flex justify-between items-center border-b">
        <h1 class="text-xl font-bold text-slate-800 flex items-center gap-2">
            <i data-lucide="mic-vocal" class="text-blue-600"></i> বাংলা ভয়েস প্যাড
        </h1>
        <div class="flex gap-2">
            <button onclick="copyText()" class="p-2 bg-slate-100 rounded-lg hover:bg-slate-200" title="কপি">
                <i data-lucide="copy" class="w-5 h-5 text-slate-600"></i>
            </button>
            <button onclick="clearText()" class="p-2 bg-red-50 rounded-lg hover:bg-red-100" title="মুছুন">
                <i data-lucide="trash-2" class="w-5 h-5 text-red-500"></i>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 p-4 flex flex-col gap-4">
        
        <!-- Text Editor -->
        <div class="flex-1 relative">
            <textarea id="textOutput" class="editor w-full h-full p-6 text-xl bg-white rounded-3xl shadow-sm border border-slate-200 resize-none leading-relaxed" placeholder="এখানে ক্লিক করে কথা বলা শুরু করুন..."></textarea>
            
            <!-- Floating Indicator -->
            <div id="statusTag" class="absolute top-4 right-4 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest bg-slate-100 text-slate-400">
                Ready
            </div>
        </div>

        <!-- Translation Grid -->
        <div class="grid grid-cols-2 gap-3">
            <button onclick="translateText('bn', 'en')" class="py-3 bg-blue-50 text-blue-700 rounded-2xl font-bold text-sm border border-blue-100 active:scale-95 transition">
                BN → EN অনুবাদ
            </button>
            <button onclick="translateText('en', 'bn')" class="py-3 bg-green-50 text-green-700 rounded-2xl font-bold text-sm border border-green-100 active:scale-95 transition">
                EN → BN অনুবাদ
            </button>
        </div>
    </main>

    <!-- Navigation / Controls -->
    <footer class="bg-white p-6 shadow-[0_-10px_30px_rgba(0,0,0,0.05)] rounded-t-[40px] flex justify-around items-end pb-8">
        
        <!-- Speaker -->
        <div class="flex flex-col items-center gap-2">
            <button id="speakerBtn" onclick="toggleSpeaker()" class="w-16 h-16 bg-slate-100 text-slate-600 rounded-full flex items-center justify-center transition-all">
                <i data-lucide="volume-2" id="speakerIcon" class="w-8 h-8"></i>
            </button>
            <span class="text-[10px] font-bold text-slate-400">শুনুন</span>
        </div>

        <!-- Microphone -->
        <div class="flex flex-col items-center gap-2">
            <button id="micBtn" onclick="toggleMic()" class="w-24 h-24 bg-blue-600 text-white rounded-full flex items-center justify-center shadow-xl active:scale-90 transition-all">
                <i data-lucide="mic" id="micIcon" class="w-10 h-10"></i>
            </button>
            <span id="micLabel" class="text-xs font-bold text-blue-600">Start Recording</span>
        </div>

        <!-- Share -->
        <div class="flex flex-col items-center gap-2">
            <button onclick="shareText()" class="w-16 h-16 bg-slate-100 text-slate-600 rounded-full flex items-center justify-center active:scale-90">
                <i data-lucide="share-2" class="w-8 h-8"></i>
            </button>
            <span class="text-[10px] font-bold text-slate-400">শেয়ার</span>
        </div>

    </footer>

    <script>
        lucide.createIcons();

        const textOutput = document.getElementById('textOutput');
        const micBtn = document.getElementById('micBtn');
        const micIcon = document.getElementById('micIcon');
        const micLabel = document.getElementById('micLabel');
        const speakerBtn = document.getElementById('speakerBtn');
        const statusTag = document.getElementById('statusTag');

        let isRecording = false;
        let recognition;

        // --- মাইক সিস্টেম (Speech to Text) ---
        try {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            
            recognition.lang = 'bn-BD'; // বাংলা সেট করা হয়েছে
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onstart = () => {
                isRecording = true;
                micBtn.classList.add('mic-active');
                micLabel.innerText = "Listening...";
                statusTag.innerText = "🔴 Recording";
                statusTag.classList.replace('bg-slate-100', 'bg-red-100');
                statusTag.classList.replace('text-slate-400', 'text-red-600');
            };

            recognition.onresult = (event) => {
                let currentText = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        textOutput.value += event.results[i][0].transcript + ' ';
                    }
                }
                textOutput.scrollTop = textOutput.scrollHeight;
            };

            recognition.onerror = (event) => {
                console.error("Mic Error:", event.error);
                if(event.error === 'not-allowed') {
                    alert("দয়া করে ব্রাউজারে মাইক ব্যবহারের অনুমতি (Allow) দিন।");
                }
                stopMic();
            };

            recognition.onend = () => {
                if (isRecording) recognition.start(); // অনবরত টাইপিং এর জন্য
            };

        } catch (e) {
            alert("আপনার ব্রাউজারে ভয়েস টাইপিং সাপোর্ট করছে না। দয়া করে Chrome ব্যবহার করুন।");
        }

        function toggleMic() {
            if (isRecording) {
                stopMic();
            } else {
                recognition.start();
            }
        }

        function stopMic() {
            isRecording = false;
            recognition.stop();
            micBtn.classList.remove('mic-active');
            micLabel.innerText = "Start Recording";
            statusTag.innerText = "Ready";
            statusTag.classList.replace('bg-red-100', 'bg-slate-100');
            statusTag.classList.replace('text-red-600', 'text-slate-400');
        }

        // --- স্পিকার সিস্টেম (Text to Speech) ---
        function toggleSpeaker() {
            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
                stopSpeakerUI();
                return;
            }

            const text = textOutput.value;
            if (!text) {
                alert("পড়ার জন্য কোন লেখা নেই!");
                return;
            }

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'bn-BD';

            utterance.onstart = () => {
                speakerBtn.classList.add('speaker-active');
                speakerBtn.classList.replace('text-slate-600', 'text-white');
                statusTag.innerText = "🔊 Speaking";
            };

            utterance.onend = () => {
                stopSpeakerUI();
            };

            window.speechSynthesis.speak(utterance);
        }

        function stopSpeakerUI() {
            speakerBtn.classList.remove('speaker-active');
            speakerBtn.classList.replace('text-white', 'text-slate-600');
            statusTag.innerText = "Ready";
        }

        // --- অন্যান্য ফাংশন ---
        async function translateText(from, to) {
            const text = textOutput.value;
            if (!text) return;
            statusTag.innerText = "Translating...";
            try {
                const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${from}|${to}`);
                const data = await res.json();
                textOutput.value = data.responseData.translatedText;
                statusTag.innerText = "Done";
            } catch (err) {
                alert("অনুবাদ করতে ব্যর্থ হয়েছে। ইন্টারনেট চেক করুন।");
                statusTag.innerText = "Ready";
            }
        }

        function copyText() {
            textOutput.select();
            document.execCommand('copy');
            alert("টেক্সট কপি করা হয়েছে!");
        }

        function clearText() {
            if(confirm("সব লেখা মুছে ফেলতে চান?")) textOutput.value = "";
        }

        function shareText() {
            if (navigator.share) {
                navigator.share({ text: textOutput.value });
            } else {
                window.open(`https://wa.me/?text=${encodeURIComponent(textOutput.value)}`);
            }
        }
    </script>
</body>
</html>
